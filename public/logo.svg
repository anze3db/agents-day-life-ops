  <!-- Heart: the thing we're protecting -->
  <path
    d="M32 48 C32 48 13 36 13 23 C13 17 18 13 23 14 C27 14 30 17 32 20 C34 17 37 14 41 14 C46 13 51 17 51 23 C51 36 32 48 32 48 Z"
    fill="#F8FAFC"
  />

  <!-- Incident indicator: pulsing red dot in the corner -->
  <circle cx="49" cy="15" r="9" fill="#0F172A"/>
  <circle cx="49" cy="15" r="6" fill="#EF4444"/>
  <circle cx="49" cy="15" r="3" fill="#FCA5A5"/>
</svg>
